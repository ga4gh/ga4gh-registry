name: Deploy to AWS CloudFormation

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  AWS_REGION: us-east-2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: Generate test coverage
        run: ./gradlew jacocoTestReport

      - name: Setting Up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Get Next Version from Docker Hub
        id: versioning
        run: |
          # Fetch all tags from Docker Hub for ga4gh/ga4gh-registry
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/ga4gh/ga4gh-registry/tags/?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)

          echo "Latest version found: $TAGS"

          # If no version found, start at 0.1.0
          if [ -z "$TAGS" ]; then
            NEXT_VERSION="0.1.0"
          else
            # Increment the patch version
            MAJOR=$(echo $TAGS | cut -d. -f1)
            MINOR=$(echo $TAGS | cut -d. -f2)
            PATCH=$(echo $TAGS | cut -d. -f3)
            NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "Next version: $NEXT_VERSION"
          echo "version=${NEXT_VERSION}" >> $GITHUB_ENV

      - name: Build and Push to Docker Hub
        id: build-push
        uses: docker/build-push-action@v2
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          file: ./Dockerfile
          push: true
          tags: |
            ga4gh/ga4gh-registry:${{ env.version }}
            ga4gh/ga4gh-registry:latest
          build-args: VERSION=${{ env.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set Image URI Output
        id: image
        run: |
          echo "image-uri=ga4gh/ga4gh-registry:${{ env.version }}" >> $GITHUB_OUTPUT

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack (Production)
        run: |
          aws cloudformation deploy \
            --template-file ./infra/cloudformation-template.yaml \
            --stack-name ga4gh-registry-dynamic \
            --parameter-overrides \
              Environment=production \
              ImageUri=${{ needs.build-and-push.outputs.image-uri }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Wait for stack update
        run: |
          aws cloudformation wait stack-update-complete \
            --stack-name ga4gh-registry-dynamic

      - name: Get stack outputs
        id: outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name ga4gh-registry-dynamic \
            --query 'Stacks[0].Outputs' > stack-outputs.json
          cat stack-outputs.json

      - name: Post deployment summary
        run: |
          echo "## Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Stack: ga4gh-registry-dynamic" >> $GITHUB_STEP_SUMMARY
          echo "Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ needs.build-and-push.outputs.image-uri }}" >> $GITHUB_STEP_SUMMARY

  notify-deployment:
    needs: [build-and-push, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            exit 0
          else
            echo "❌ Deployment failed!"
            exit 1
          fi